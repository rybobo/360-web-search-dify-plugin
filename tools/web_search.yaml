identity:
    name: "360-web-search"
    label:
      zh_Hans: "360智能搜索"
      en_US: "360 Web Search"
    description:
      zh_Hans: "搜索中文网页内容，获取最新信息"
      en_US: "Search Chinese web content"

  parameters:
    - name: "query"
      type: "string"
      required: true
      label:
        zh_Hans: "搜索关键词"
        en_US: "Search Query"
      form: "llm"
      human_description:
        zh_Hans: "需要搜索的内容"
        en_US: "Content to search"
      llm_description: "使用此工具搜索中文网页，获取最新信息"

    - name: "count"
      type: "number"
      required: false
      default: 5
      min: 1
      max: 50
      label:
        zh_Hans: "返回结果数量"
        en_US: "Result Count"
      form: "form"
      human_description:
        zh_Hans: "返回结果数量（1-20）"
        en_US: "Number of results (1-20)"
